apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: suilens-2306207101
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: catalog
            - name: POSTGRES_PASSWORD
              value: catalog
            - name: POSTGRES_DB
              value: catalog
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: suilens-2306207101
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
      targetPort: 5432
---
