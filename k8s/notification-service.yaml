apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: suilens-2306207101
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: qinnyboy/suilens-notification:latest
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgres://notifications:notifications@notification-db:5432/notifications
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: suilens-2306207101
spec:
  selector:
    app: notification-service
  ports:
    - port: 3003
      targetPort: 3003
