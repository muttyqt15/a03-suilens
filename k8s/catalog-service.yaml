apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2306207101
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: qinnyboy/suilens-catalog:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://catalog:catalog@catalog-db:5432/catalog
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2306207101
spec:
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
