apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-2306207101
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: qinnyboy/suilens-order:latest
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              value: postgres://orders:orders@order-db:5432/orders
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3001
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-2306207101
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
